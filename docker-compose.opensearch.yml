services:
  opensearch:
    image: opensearchproject/opensearch:2
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 10s
      timeout: 10s
      retries: 20

  backend:
    build:
      context: ./backend-opensearch
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX: ${OPENSEARCH_INDEX:-products}
      PORT: 8080
    depends_on:
      opensearch:
        condition: service_healthy

  seed:
    build:
      context: ./backend-opensearch
      dockerfile: Dockerfile.seed
    environment:
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX: ${OPENSEARCH_INDEX:-products}
    depends_on:
      opensearch:
        condition: service_healthy
    profiles:
      - tools

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  opensearch_data:
